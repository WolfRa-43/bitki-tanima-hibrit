<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bitki Tanıma Sistemi</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7f2;
      color: #1f1f1f;
    }

    .container {
      max-width: 820px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
    }

    .upload-box {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    input[type="file"] {
      padding: 12px;
      border: 1px solid #d7e2d2;
      border-radius: 12px;
      background: #fafcf9;
    }

    button {
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #2f7d32;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #27692a;
    }

    #preview {
      margin-top: 16px;
      width: 100%;
      max-height: 380px;
      object-fit: contain;
      border-radius: 12px;
      display: none;
      border: 1px solid #e0e0e0;
      background: #fff;
    }

    #result {
      margin-top: 20px;
      padding: 18px;
      border-radius: 14px;
      background: #eef8ec;
      border: 1px solid #d3e9cf;
      white-space: pre-line;
      min-height: 120px;
    }

    .small {
      font-size: 14px;
      color: #666;
      margin-top: 10px;
    }

    .loading {
      color: #2f7d32;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>🌿 Bitki Tanıma Sistemi</h1>

      <div class="upload-box">
        <input type="file" id="imageInput" accept="image/*" />
        <button id="analyzeBtn">Bitkiyi Tanı</button>
      </div>

      <img id="preview" alt="Görsel önizleme" />

      <div id="result">Henüz analiz yapılmadı.</div>
      <div class="small">
        Sistem önce kendi veritabanındaki görsellerle karşılaştırma yapar, gerekirse internetten doğrular.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
  <script src="/app.js"></script>
</body>
</html>
